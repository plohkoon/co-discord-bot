# fly.toml app configuration file generated for co-bot on 2026-07-16T14:41:20-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'co-bot'
primary_region = 'yyz'
console_command = '/rails/bin/rails console'

[build]
[env]
  DATABASE_URL = 'sqlite3:///data/production.sqlite3'
  PORT = '8080'
  # Puma forks the supervised Discord gateway child (lib/puma/plugin/discord_bot.rb).
  RUN_DISCORD_BOT = '1'

[processes]
  app = "./bin/rails server"

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
