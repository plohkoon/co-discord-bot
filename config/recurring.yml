# Solid Queue recurring tasks, per environment. The scheduler runs wherever the
# workers run (bin/jobs in dev, SOLID_QUEUE_IN_PUMA in production).
# Application reminders/auto-rejects are NOT here — they're exact-timestamp
# scheduled jobs enqueued by Applications::Timeline at submit time.

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
